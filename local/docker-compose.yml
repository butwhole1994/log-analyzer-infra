services:
  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: ${POSTGRES_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${LOCAL_BIND_ADDRESS}:${POSTGRES_HOST_PORT}:${POSTGRES_CONTAINER_PORT}"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - log-analyzer-net

  redis:
    image: ${REDIS_IMAGE}
    container_name: ${REDIS_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${LOCAL_BIND_ADDRESS}:${REDIS_HOST_PORT}:${REDIS_CONTAINER_PORT}"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - log-analyzer-net

  redis-commander:
    image: ${REDIS_COMMANDER_IMAGE}
    container_name: ${REDIS_COMMANDER_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${LOCAL_BIND_ADDRESS}:${REDIS_COMMANDER_HOST_PORT}:${REDIS_COMMANDER_CONTAINER_PORT}"
    environment:
      REDIS_HOSTS: local:redis:${REDIS_CONTAINER_PORT}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - log-analyzer-net

  kafka:
    image: ${KAFKA_IMAGE}
    container_name: ${KAFKA_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${LOCAL_BIND_ADDRESS}:${KAFKA_HOST_PORT}:${KAFKA_EXTERNAL_CONTAINER_PORT}"
    environment:
      KAFKA_NODE_ID: ${KAFKA_NODE_ID}
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: ${KAFKA_NODE_ID}@kafka:${KAFKA_CONTROLLER_PORT}

      KAFKA_LISTENERS: INTERNAL://:${KAFKA_INTERNAL_PORT},EXTERNAL://:${KAFKA_EXTERNAL_CONTAINER_PORT},CONTROLLER://:${KAFKA_CONTROLLER_PORT}
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:${KAFKA_INTERNAL_PORT},EXTERNAL://localhost:${KAFKA_HOST_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:${KAFKA_INTERNAL_PORT} --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - log-analyzer-net

  kafka-ui:
    image: ${KAFKA_UI_IMAGE}
    container_name: ${KAFKA_UI_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${LOCAL_BIND_ADDRESS}:${KAFKA_UI_HOST_PORT}:${KAFKA_UI_CONTAINER_PORT}"
    environment:
      KAFKA_CLUSTERS_0_NAME: ${KAFKA_CLUSTER_NAME}
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:${KAFKA_INTERNAL_PORT}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - log-analyzer-net

  opensearch:
    image: ${OPENSEARCH_IMAGE}
    container_name: ${OPENSEARCH_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      discovery.type: ${OPENSEARCH_DISCOVERY_TYPE}
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS}
      DISABLE_SECURITY_PLUGIN: ${OPENSEARCH_DISABLE_SECURITY_PLUGIN}
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${LOCAL_BIND_ADDRESS}:${OPENSEARCH_HOST_PORT}:${OPENSEARCH_CONTAINER_PORT}"
      - "${LOCAL_BIND_ADDRESS}:${OPENSEARCH_PERFORMANCE_ANALYZER_HOST_PORT}:${OPENSEARCH_PERFORMANCE_ANALYZER_CONTAINER_PORT}"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:${OPENSEARCH_CONTAINER_PORT}/_cluster/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - log-analyzer-net

  opensearch-dashboards:
    image: ${OPENSEARCH_DASHBOARDS_IMAGE}
    container_name: ${OPENSEARCH_DASHBOARDS_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${LOCAL_BIND_ADDRESS}:${OPENSEARCH_DASHBOARDS_HOST_PORT}:${OPENSEARCH_DASHBOARDS_CONTAINER_PORT}"
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:${OPENSEARCH_CONTAINER_PORT}"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: ${OPENSEARCH_DASHBOARDS_DISABLE_SECURITY_PLUGIN}
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - log-analyzer-net

volumes:
  pg_data:
  redis_data:
  kafka_data:
  opensearch_data:

networks:
  log-analyzer-net:
    driver: bridge